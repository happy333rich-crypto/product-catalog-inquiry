<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>測試版載入中｜產品電子型錄</title>
</head>
<body>
  <p style="font-family:sans-serif;padding:24px;text-align:center;">測試版載入中…</p>
  <script>
    (async () => {
      const version = "20260711-preview-15";
      try {
        const response = await fetch(`index.html?v=${version}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`測試頁讀取失敗（${response.status}）`);

        let html = await response.text();
        html = html
          .replace(/<title>[\s\S]*?<\/title>/, "<title>測試版｜產品電子型錄</title>")
          .replace(/<meta name="build-version"[^>]*>/, `<meta name="build-version" content="${version}">`)
          .replace(/cache-bust\.js\?v=[^"']+/, `preview-cache-bust.js?v=${version}`)
          .replace(
            /(<script src="juwei-addon\.js\?v=[^"']+" defer><\/script>)/,
            `$1\n  <script src="preview-brand-group.js?v=${version}" defer><\/script>\n  <script src="white-lan-preview-addon.js?v=${version}" defer><\/script>\n  <script src="kao-image-preview-addon.js?v=${version}" defer><\/script>`
          )
          .replace("</head>", `<style>
            .preview-banner { position: sticky; top: 0; z-index: 1000; padding: 10px 16px; background: #fff3cd; border-bottom: 1px solid #e6cf83; color: #664d03; font-weight: 700; text-align: center; }
          </style></head>`)
          .replace("<body>", `<body><div class="preview-banner">測試版｜確認完成後才會更新正式網站</div>`);

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = `<p style="font-family:sans-serif;padding:24px;text-align:center;">${error.message}</p>`;
      }
    })();
  </script>
</body>
</html>
