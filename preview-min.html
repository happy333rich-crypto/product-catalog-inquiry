<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>最小測試版｜產品電子型錄</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:#faf8f2;color:#1f2a24}
    header{position:sticky;top:0;background:#fff3cd;padding:12px 16px;font-weight:700;border-bottom:1px solid #e6cf83;z-index:5}
    main{max-width:1100px;margin:auto;padding:20px}
    .filters{display:grid;grid-template-columns:1fr 220px;gap:12px;margin:16px 0}
    input,select{width:100%;min-height:44px;padding:10px 12px;border:1px solid #dce3de;border-radius:12px;background:#fff}
    .status{padding:18px;background:#fff;border:1px solid #dce3de;border-radius:16px;margin:16px 0}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .card{background:#fff;border:1px solid #dce3de;border-radius:18px;overflow:hidden}
    .image{aspect-ratio:1/1;display:grid;place-items:center;background:#f5f8f5;color:#657269;padding:16px;text-align:center}
    .image img{max-width:100%;max-height:100%;object-fit:contain}
    .content{padding:14px}.brand{font-size:.78rem;color:#4f765d;font-weight:700}.name{font-weight:700;margin:6px 0}.meta{font-size:.82rem;color:#657269}
    .error{background:#fdeaea;border-color:#e2a5a5;color:#8a2424}
    @media(max-width:760px){.filters{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
<header>最小測試版｜只驗證商品載入、品牌排序與圖片</header>
<main>
  <h1>產品電子型錄</h1>
  <div class="filters">
    <input id="search" type="search" placeholder="搜尋品名或條碼">
    <select id="brand"><option value="">全部品牌</option></select>
  </div>
  <div id="status" class="status">正在載入商品資料…</div>
  <div id="grid" class="grid"></div>
</main>
<script>
(() => {
  const files = [
    'products.json','wet-wipes.json','guoshao-products.json','crocodile-products.json',
    'preview-products.json','unilever-extra-preview.json','nankiao-preview.json',
    'yusheng-preview.json','qinghui-preview.json','kao-preview-1.json','kao-preview-2.json',
    'kao-preview-3.json','chungtai-extra-preview.json','you-pin-products.json'
  ];
  const excluded = new Set(['608871','608891','608911']);
  const order = ['舒潔','可麗舒/可立雅','春風','蒲公英','原萃','靠得住','好奇','力可潔','居居加/居美媞/妙妙熊/鉅瑋','白蘭','南僑','鱷魚/必安住','優品','清檜','優生'];
  const rank = new Map(order.map((b,i)=>[b,i]));
  const normalizeBrand = (brand) => {
    if (['可麗舒','可立雅'].includes(brand)) return '可麗舒/可立雅';
    if (['居居加','居美媞','妙妙熊','鉅瑋'].includes(brand)) return '居居加/居美媞/妙妙熊/鉅瑋';
    if (['立可潔','力可潔'].includes(brand)) return '力可潔';
    if (brand === '鱷魚' || brand === '必安住') return '鱷魚/必安住';
    return brand || '其他';
  };
  const status = document.getElementById('status');
  const grid = document.getElementById('grid');
  const brandSelect = document.getElementById('brand');
  const search = document.getElementById('search');
  let products = [];

  const render = () => {
    const q = search.value.trim().toLowerCase();
    const brand = brandSelect.value;
    const list = products.filter(p => (!brand || p.brand === brand) && (!q || `${p.name} ${p.barcode||''} ${p.sku||''}`.toLowerCase().includes(q)));
    status.className = 'status';
    status.textContent = `已載入 ${products.length} 項，目前顯示 ${list.length} 項`;
    grid.innerHTML = list.map(p => `<article class="card"><div class="image">${p.image ? `<img src="${String(p.image).replace(/"/g,'&quot;')}" alt="${String(p.name).replace(/"/g,'&quot;')}">` : '圖片整理中'}</div><div class="content"><div class="brand">${p.brand}</div><div class="name">${p.name}</div><div class="meta">${p.spec||''}<br>箱入數：${p.casePack ?? ''}</div></div></article>`).join('');
  };

  Promise.all(files.map(async file => {
    try {
      const r = await fetch(`${file}?v=20260711-min-1`, {cache:'no-store'});
      if (!r.ok) return [];
      const data = await r.json();
      return Array.isArray(data) ? data : [];
    } catch (_) { return []; }
  })).then(groups => {
    const map = new Map();
    groups.flat().forEach(p => {
      const id = p && p.id ? String(p.id) : '';
      if (!id || excluded.has(id) || p.active === false) return;
      const product = {...p, brand: normalizeBrand(p.brand)};
      if (['紅恐龍','蟑愛呷','蟻愛呷','家能淨'].some(k => String(product.name||'').includes(k))) product.brand = '鱷魚/必安住';
      map.set(id, product);
    });
    products = [...map.values()].sort((a,b) => (rank.get(a.brand) ?? 999) - (rank.get(b.brand) ?? 999) || String(a.name).localeCompare(String(b.name),'zh-Hant',{numeric:true}));
    [...new Set(products.map(p=>p.brand))].sort((a,b)=>(rank.get(a)??999)-(rank.get(b)??999)||a.localeCompare(b,'zh-Hant')).forEach(b => {
      const o = document.createElement('option'); o.value=b; o.textContent=b; brandSelect.appendChild(o);
    });
    render();
  }).catch(err => {
    status.className='status error'; status.textContent=`商品載入失敗：${err.message}`;
  });
  search.addEventListener('input',render);
  brandSelect.addEventListener('change',render);
})();
</script>
</body>
</html>
